<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crystal Music</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

  <div class="container">

    <div class="sidebar">
      <div class="profile">
        <img src="https://i.imgur.com/2DhmtJ4.png" alt="profile">
        <h2>Crystal User</h2>
      </div>

      <div class="menu">
        <button onclick="showHome()">🏠 Home</button>
        <button onclick="showTrending()">🔥 Trending</button>
      </div>
    </div>


    <div class="main">

      <div class="topbar">
        <h1>🎵 Crystal Music</h1>

        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search Songs...">
          <button onclick="searchSong()">Search</button>
        </div>
      </div>


      <div id="results"></div>


      <div class="player">
        <iframe
          id="player"
          width="100%"
          height="100%"
          src=""
          frameborder="0"
          allow="autoplay"
          allowfullscreen>
        </iframe>
      </div>

    </div>

  </div>

<script src="app.js"></script>
</body>
</html>
